<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background Circle -->
  <circle cx="60" cy="60" r="58" fill="#f0fdfa" stroke="#06b6d4" stroke-width="2" opacity="0.9"/>
  <!-- Laptop Base -->
  <rect x="28" y="55" width="64" height="38" rx="4" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Laptop Screen -->
  <rect x="32" y="58" width="56" height="28" rx="2" fill="#1e293b"/>
  <!-- Screen Content — Code Lines -->
  <rect x="38" y="64" width="20" height="2" rx="1" fill="#06b6d4" opacity="0.9"/>
  <rect x="38" y="69" width="32" height="2" rx="1" fill="#22d3ee" opacity="0.7"/>
  <rect x="38" y="74" width="14" height="2" rx="1" fill="#06b6d4" opacity="0.8"/>
  <rect x="54" y="74" width="18" height="2" rx="1" fill="#67e8f9" opacity="0.6"/>
  <rect x="38" y="79" width="26" height="2" rx="1" fill="#22d3ee" opacity="0.7"/>
  <!-- Laptop Keyboard -->
  <rect x="24" y="93" width="72" height="5" rx="2" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <!-- Trackpad -->
  <rect x="48" y="94" width="24" height="3" rx="1" fill="#d1d5db"/>
  <!-- Emoji Face (on top of laptop) -->
  <circle cx="60" cy="40" r="16" fill="#FBBF24"/>
  <!-- Eyes -->
  <circle cx="54" cy="37" r="2" fill="#1e293b"/>
  <circle cx="66" cy="37" r="2" fill="#1e293b"/>
  <!-- Smile -->
  <path d="M 53 43 Q 60 49 67 43" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
